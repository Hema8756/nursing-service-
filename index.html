<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hema CARD</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Kafr-ElSheikh:wght@600;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#007BFF;
  --secondary:#0f0f0f;
  --accent:#00BFFF;
  --glass:rgba(255,255,255,.05);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Kafr-ElSheikh',sans-serif;
  background:var(--secondary);
  color:#fff;
  text-align:center;
}

#bg-video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.3);
  z-index:-3;
}

#content{
  max-width:1000px;
  margin:auto;
  padding:100px 20px;
}

.profile-pic{
  width:220px;
  height:220px;
  margin:auto;
  border-radius:50%;
  padding:10px;
  background:var(--primary);
  box-shadow:0 0 40px var(--primary);
}

.profile-pic img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

h1{
  margin:30px 0 10px;
  font-size:3.5em;
}

h1 span{
  color:var(--primary);
}

.description{
  color:#ccc;
  margin-bottom:20px;
}

/* ECG + قلب بينبض */
.ecg-container{
  width:100%;
  height:80px;
  margin:30px 0;
  overflow:hidden;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px; /* المسافة بين ECG والقلب */
}

.ecg-line svg{
  width:80%;
  height:80px;
  stroke:#00ff6a;
  stroke-width:3;
  fill:none;
  stroke-dasharray:1000;
  stroke-dashoffset:1000;
  animation:ecgMove 2s linear infinite;
}

@keyframes ecgMove{
  to{ stroke-dashoffset:0; }
}

.heart {
  width: 30px;   /* حجم القلب مضبوط */
  height: 30px;
  background: red;
  clip-path: polygon(
    50% 0%, 61% 14%, 75% 14%, 85% 25%, 85% 38%, 
    50% 100%, 15% 38%, 15% 25%, 25% 14%, 39% 14%
  );
  animation: heartbeat 1s infinite;
}

@keyframes heartbeat{
  0%,100%{ transform: scale(1); }
  25%{ transform: scale(1.2); }
  50%{ transform: scale(1); }
  75%{ transform: scale(1.2); }
}

/* أزرار */
.buttons{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  margin:40px 0;
}

.btn{
  padding:18px;
  border-radius:25px;
  background:var(--glass);
  color:#fff;
  font-weight:800;
  text-decoration:none;
  transition:.3s;
}

.btn i{
  margin-left:10px;
  color:var(--primary);
}

.btn:hover{
  background:var(--primary);
  color:#000;
}

.services{
  margin-top:60px;
  padding:40px;
  border-radius:30px;
  background:var(--glass);
}

.services h2{
  margin-bottom:30px;
  color:var(--primary);
}

.order-btn{
  display:inline-block;
  margin-top:30px;
  padding:18px 35px;
  background:#25D366;
  color:#000;
  font-weight:900;
  border-radius:40px;
  text-decoration:none;
  box-shadow:0 0 40px #25D366;
}

.call-btn{
  display:inline-block;
  margin-top:20px;
  padding:18px 35px;
  background:#00BFFF;
  color:#000;
  font-weight:900;
  border-radius:40px;
  text-decoration:none;
  box-shadow:0 0 40px #00BFFF;
}

.map{
  margin-top:60px;
  border-radius:20px;
  overflow:hidden;
}
</style>
</head>
